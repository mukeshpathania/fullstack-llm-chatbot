<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal AI</title>
    <link href="./src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-screen w-screen overflow-hidden flex bg-zinc-950 text-zinc-200 antialiased selection:bg-zinc-800 selection:text-white">

    <!-- Sidebar: Chat History -->
    <aside class="w-72 h-full flex flex-col border-r border-white/5 bg-zinc-900/30">
        <div class="p-6">
            <h1 class="text-sm font-medium tracking-wide text-zinc-400 flex items-center gap-2 uppercase">
                <i data-lucide="cpu" class="w-4 h-4"></i> AI Assistant
            </h1>
            
            <button id="newChatBtn" class="mt-6 w-full py-2.5 px-4 rounded-lg bg-white/5 hover:bg-white/10 border border-white/5 transition-all duration-300 flex items-center gap-2 text-sm text-zinc-300">
                <i data-lucide="plus" class="w-4 h-4"></i>
                New Chat
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 pb-4 flex flex-col gap-1" id="historyList">
            <!-- History Items will be injected here via JS -->
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 h-full flex flex-col relative bg-zinc-950">
        
        <!-- Header -->
        <header class="h-16 border-b border-white/5 flex items-center px-8 shrink-0">
            <h2 class="text-sm font-medium text-zinc-400">Current Session</h2>
        </header>

        <!-- Chat Messages Container -->
        <div class="flex-1 overflow-y-auto p-8 flex flex-col gap-8 scroll-smooth" id="chatBox">
            <!-- Welcome Message -->
            <div class="flex flex-col items-center justify-center h-full text-center opacity-60 transition-opacity duration-500" id="emptyState">
                <div class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center mb-4 bg-zinc-900/50">
                    <i data-lucide="sparkles" class="w-5 h-5 text-zinc-400"></i>
                </div>
                <h3 class="text-lg font-medium text-zinc-300 mb-1">How can I help you today?</h3>
                <p class="text-sm text-zinc-500">Ask a question or request assistance.</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-8 shrink-0">
            <div class="max-w-3xl mx-auto">
                <form id="chatForm" class="relative group">
                    <input type="text" id="userInput" placeholder="Ask anything..." class="w-full bg-zinc-900/50 hover:bg-zinc-900/80 focus:bg-zinc-900 border border-white/5 hover:border-white/10 focus:border-zinc-700 rounded-xl py-3.5 pl-5 pr-14 outline-none transition-all duration-300 text-sm text-zinc-200 placeholder-zinc-600 shadow-sm" autocomplete="off" required>
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 rounded-lg flex items-center justify-center text-zinc-500 hover:text-zinc-200 hover:bg-white/5 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i data-lucide="send" class="w-4 h-4 ml-0.5"></i>
                    </button>
                </form>
                <div class="text-center mt-3">
                    <p class="text-[10px] text-zinc-600">AI can make mistakes. Consider verifying important information.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Custom Edit Title Modal -->
    <div id="editModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-200">
        <div id="editModalContent" class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 w-full max-w-sm shadow-xl transform scale-95 transition-transform duration-200">
            <h3 class="text-base font-medium text-zinc-200 mb-4">Rename Chat</h3>
            <input type="text" id="editTitleInput" class="w-full bg-zinc-950 border border-zinc-700 focus:border-zinc-500 rounded-lg py-2.5 px-3 outline-none text-sm text-zinc-200 mb-6 shadow-inner" placeholder="Enter new title...">
            <div class="flex justify-end gap-3">
                <button id="cancelEditBtn" class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-white hover:bg-zinc-800 rounded-lg transition-colors">Cancel</button>
                <button id="confirmEditBtn" class="px-4 py-2 text-sm font-medium text-zinc-900 bg-zinc-200 hover:bg-white rounded-lg transition-colors shadow-sm">Save</button>
            </div>
        </div>
    </div>

    <!-- Custom Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-200">
        <div id="deleteModalContent" class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 w-full max-w-sm shadow-xl transform scale-95 transition-transform duration-200">
            <h3 class="text-base font-medium text-zinc-200 mb-2">Delete chat session?</h3>
            <p class="text-sm text-zinc-400 mb-6">This will permanently remove the conversation and its messages. This action cannot be undone.</p>
            <div class="flex justify-end gap-3">
                <button id="cancelDeleteBtn" class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-white hover:bg-zinc-800 rounded-lg transition-colors">Cancel</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 text-sm font-medium text-white bg-red-900/50 hover:bg-red-800/80 border border-red-900/50 rounded-lg transition-colors shadow-sm">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed top-6 right-6 z-[100] flex flex-col gap-3"></div>

    <script src="./src/app.js"></script>
</body>
</html>
